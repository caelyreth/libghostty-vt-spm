name: Build libghostty-vt

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Publish the version declared in Package.swift."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref_name }}${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true' && '-release' || '' }}
  cancel-in-progress: true

defaults:
  run:
    shell: sh

jobs:
  prepare:
    runs-on: macos-15
    outputs:
      build_ref: ${{ steps.prepare.outputs.build_ref }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      do_release: ${{ steps.prepare.outputs.do_release }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Prepare Build
        id: prepare
        run: ./Scripts/ci/prepare.sh "$RELEASE"
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release || 'false' }}

  build:
    needs: prepare
    name: Build ${{ matrix.artifact }}
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            artifact: ghostty-vt-macosx-arm64
          - target: x86_64-macos
            artifact: ghostty-vt-macosx-x86_64
          - target: aarch64-ios
            artifact: ghostty-vt-iphoneos-arm64
          - target: aarch64-ios-simulator
            artifact: ghostty-vt-iphonesimulator-arm64
            cpu: apple_a17
          - target: x86_64-ios-simulator
            artifact: ghostty-vt-iphonesimulator-x86_64
          - target: aarch64-ios-macabi
            artifact: ghostty-vt-maccatalyst-arm64
            cpu: apple_a17
          - target: x86_64-ios-macabi
            artifact: ghostty-vt-maccatalyst-x86_64
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Checkout Ghostty
        run: |
          git clone https://github.com/ghostty-org/ghostty references/ghostty-upstream
          git -C references/ghostty-upstream checkout "${{ needs.prepare.outputs.build_ref }}"

      - name: Build
        run: |
          ZIG_CPU="${{ matrix.cpu }}" ./Scripts/build-target.sh \
            "$PWD/references/ghostty-upstream" \
            "${{ matrix.target }}" \
            "$PWD/build/out"

      - name: Upload Target
        run: tar -czf "${{ matrix.artifact }}.tar.gz" -C build/out .

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          compression-level: 0
          retention-days: 1

  package:
    name: Prepare XCFramework
    needs: [prepare, build]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: ghostty-vt-*
          path: build/tarballs
          merge-multiple: true

      - name: Create XCFramework
        run: |
          ./Scripts/ci/assemble-artifacts.sh build/tarballs build/dest
          ./Scripts/create-xcframework.sh \
            "$PWD/build/dest" \
            "$PWD/binary/GhosttyVtPrebuilt.xcframework" \
            "$PWD/build/GhosttyVtPrebuilt.xcframework.zip"

      - name: Test Products
        run: |
          cp Scripts/templates/Package.local.swift Package.swift
          swift build --product GhosttyVtRaw
          swift test

      - uses: actions/upload-artifact@v7.0.1
        if: needs.prepare.outputs.do_release != 'true'
        with:
          name: GhosttyVtPrebuilt.xcframework.zip
          path: build/GhosttyVtPrebuilt.xcframework.zip
          compression-level: 0
          retention-days: 7

      - name: Update Package Manifest
        if: needs.prepare.outputs.do_release == 'true'
        run: |
          ./Scripts/update-package.sh \
            "$PWD/build/GhosttyVtPrebuilt.xcframework.zip" \
            "${{ needs.prepare.outputs.release_tag }}" \
            "https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.release_tag }}/GhosttyVtPrebuilt.xcframework.zip"

      - name: Commit Package Manifest
        if: needs.prepare.outputs.do_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore: publish libghostty-vt ${{ needs.prepare.outputs.release_tag }}" || echo "No changes to commit"
          git push

      - name: Publish Release
        if: needs.prepare.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.event.repository.default_branch }}
          body: |
            ### GhosttyVt ${{ needs.prepare.outputs.release_tag }}

            SwiftPM binary package for `libghostty-vt`.

            ### Upstream

            - Ref: [`${{ needs.prepare.outputs.build_ref }}`](https://github.com/ghostty-org/ghostty/tree/${{ needs.prepare.outputs.build_ref }})

            ### Assets

            - `GhosttyVtPrebuilt.xcframework.zip`: SwiftPM binary target artifact.
            - `ghostty-vt-*.tar.gz`: per-SDK static library archives.
          files: |
            build/GhosttyVtPrebuilt.xcframework.zip
            build/tarballs/ghostty-vt-*.tar.gz
